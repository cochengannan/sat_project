<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login - CSC SAT 2026</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a6e 0%, #1a1a9e 60%, #e60000 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      width: 100%; max-width: 400px;
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .login-header {
      background: #0a0a6e; color: #fff;
      padding: 2rem; text-align: center;
    }
    .login-header h4 { font-weight: 800; margin: 0; }
    .login-header p  { opacity: .8; margin: .3rem 0 0; font-size: .9rem; }
    .login-body { background: #fff; padding: 2rem; }
    .btn-login { background: #e60000; color: #fff; border: none;
                 font-weight: 700; width: 100%; padding: .75rem; border-radius: 10px; }
    .btn-login:hover { background: #b71c1c; color: #fff; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <div style="font-size:2.5rem;"><i class="bi bi-shield-lock-fill"></i></div>
      <h4 class="mt-2">Admin Login</h4>
      <p>CSC SAT 2026 Portal</p>
    </div>
    <div class="login-body">

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('admin_login') }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Admin username" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
          </div>
        </div>
        <button type="submit" class="btn-login">
          <i class="bi bi-box-arrow-in-right me-2"></i>Login
        </button>
      </form>

      <div class="text-center mt-3">
        <a href="{{ url_for('index') }}" class="text-muted small">
          <i class="bi bi-arrow-left me-1"></i>Back to site
        </a>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
