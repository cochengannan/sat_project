<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — CSC SAT 2026</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --red: #D32F2F; --navy: #1A237E; --navy-light: #283593; --gold: #F9A825; }
    * { box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, var(--navy) 0%, #0d1257 50%, var(--red) 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      width: 100%; max-width: 420px;
      overflow: hidden;
    }
    .login-header {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
      padding: 32px 28px 24px;
      text-align: center;
      color: #fff;
    }
    .lh-logo {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 3px solid var(--gold);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .lh-logo .csc { color: var(--gold); font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 24px; line-height: 1; }
    .lh-logo .iso { color: rgba(255,255,255,0.6); font-size: 7px; line-height: 1.4; }
    .login-header h4 { font-weight: 800; font-size: 18px; margin: 0; }
    .login-header p { color: var(--gold); font-size: 12px; margin: 4px 0 0; }
    .login-body { padding: 28px; }
    .form-label-sat { font-weight: 600; font-size: 13px; color: var(--navy); margin-bottom: 5px; display: block; }
    .form-control-sat {
      border: 1.5px solid #ddd; border-radius: 10px;
      padding: 11px 14px; font-size: 14px; width: 100%;
      transition: border-color 0.2s;
    }
    .form-control-sat:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(26,35,126,0.1);
      outline: none;
    }
    .input-icon-wrap { position: relative; }
    .input-icon-wrap .ii { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 14px; }
    .input-icon-wrap .form-control-sat { padding-left: 38px; }
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--red) 0%, #B71C1C 100%);
      color: #fff; border: none;
      font-weight: 700; font-size: 15px;
      padding: 13px; border-radius: 10px;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(211,47,47,0.3);
    }
    .btn-login:hover { background: #B71C1C; transform: translateY(-1px); }
    .login-footer { text-align: center; padding: 0 28px 24px; }
    .login-footer a { color: var(--navy); font-size: 12px; text-decoration: none; opacity: 0.6; }
    .login-footer a:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <div class="lh-logo">
        <div class="csc">CSC</div>
        <div class="iso">ISO 9001<br>2015</div>
      </div>
      <h4>Admin Portal</h4>
      <p>CSC Scholarship Aptitude Test 2026</p>
    </div>
    <div class="login-body">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
          <div class="alert alert-{{ category }} rounded-3 py-2 px-3 mb-3" style="font-size:13px;">
            <i class="fas fa-exclamation-triangle me-1"></i>{{ message }}
          </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('admin_login') }}">
        <div class="mb-3">
          <label class="form-label-sat">Username</label>
          <div class="input-icon-wrap">
            <i class="fas fa-user ii"></i>
            <input type="text" class="form-control-sat" name="username" placeholder="Enter username" required autocomplete="off">
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label-sat">Password</label>
          <div class="input-icon-wrap">
            <i class="fas fa-lock ii"></i>
            <input type="password" class="form-control-sat" name="password" placeholder="Enter password" required>
          </div>
        </div>
        <button type="submit" class="btn-login">
          <i class="fas fa-sign-in-alt me-2"></i>Sign In to Admin
        </button>
      </form>
    </div>
    <div class="login-footer">
      <a href="{{ url_for('index') }}"><i class="fas fa-arrow-left me-1"></i>Back to Public Site</a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
