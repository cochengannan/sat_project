<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login — SAT 2026</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0D1257 0%, #1A237E 60%, #283593 100%);
      min-height: 100vh; display: flex; align-items: center;
    }
    .login-card { border: none; border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,.3); overflow: hidden; }
    .login-header { background: linear-gradient(135deg,#0D1257,#1A237E); padding: 2rem; text-align: center; }
    .csc-text-badge {
      background: #FFD700; color: #0D1257;
      font-weight: 900; padding: 5px 16px; border-radius: 7px; font-size: 1.1rem;
    }
    .form-control:focus {
      border-color: #1A237E;
      box-shadow: 0 0 0 .2rem rgba(26,35,126,.25);
    }
    .btn-login { background: #1A237E; color: #fff; border: none; font-weight: 700; }
    .btn-login:hover { background: #0D1257; color: #fff; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-sm-10 col-md-7 col-lg-5">
      <div class="card login-card">
        <div class="login-header">
          <span class="csc-text-badge">CSC</span>
          <h3 class="mt-3 mb-1 fw-bold text-white">Admin Portal</h3>
          <p class="mb-0 small text-white" style="opacity:.7;">SAT 2026 — Registration Management</p>
        </div>
        <div class="card-body p-4">
          {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
            {% endfor %}
          {% endwith %}

          <form method="POST">
            <div class="mb-3">
              <label class="form-label fw-semibold">Username</label>
              <input type="text" class="form-control form-control-lg" name="username"
                     placeholder="admin" autofocus>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" class="form-control form-control-lg" name="password"
                     placeholder="••••••••">
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-login btn-lg">
                <i class="fas fa-sign-in-alt me-2"></i>Login
              </button>
            </div>
          </form>
          <p class="text-center mt-4 mb-0">
            <a href="/" style="color:#1A237E;font-size:.9rem;">← Back to Website</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
